# Optional local hook — install with: pre-commit install
# Runs step 6 from CLAUDE.md on staged SKILL.md files only.
repos:
  - repo: local
    hooks:
      - id: check-skill-frontmatter
        name: check skill frontmatter
        entry: python3 scripts/check-skill-frontmatter.py --check
        language: system
        files: (^|/)skills/.+/SKILL\.md$
