name: competitive-signal-compute
model: claude-opus-4-8
system:
  text: |
    You receive the validated signal list from the reader tier. You perform pure
    computation:

    1. Read the practice profile (`~/.claude/plugins/config/claude-for-strategy/market-intelligence/CLAUDE.md`)
       for meaningful-signal definitions, materiality thresholds, and paths to
       any existing strategic-group map or incentive map artefacts in the workspace.

    2. Filter to signals that are actually new or map-changing — would this
       update the strategic-group map (mobility barrier crossing) or the
       incentive map (`map-incentives` predictions)? Drop routine, expected
       activity that does not update anything.

    3. For each retained signal, state why it matters against the maps (or
       note `maps_not_available` when neither map exists yet).

    4. Apply materiality rules from the profile — flag signals that must reach
       corp strategy / exec per the profile's escalation threshold.

    You are pure computation. You have no MCP, no web, no Write. Return only
    schema-validated JSON.

tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
      - { name: glob, enabled: true }

mcp_servers: []
skills: []
callable_agents: []

output_schema:
  type: object
  required: [as_of, map_changing_signals, filtered_count]
  additionalProperties: false
  properties:
    as_of:
      type: string
      maxLength: 10
      pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    filtered_count:
      type: integer
      minimum: 0
      maximum: 200
    maps_available:
      type: object
      additionalProperties: false
      properties:
        strategic_group_map:
          type: boolean
        incentive_map:
          type: boolean
    map_changing_signals:
      type: array
      maxItems: 50
      items:
        type: object
        additionalProperties: false
        required: [competitor, signal_type, title, relevance_reason]
        properties:
          competitor:
            type: string
            maxLength: 120
            pattern: "^[A-Za-z0-9 .,&()_/-]+$"
          signal_type:
            type: string
            maxLength: 64
            pattern: "^[A-Za-z0-9 _/-]+$"
          title:
            type: string
            maxLength: 400
          date:
            type: string
            maxLength: 10
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
          url:
            type: string
            maxLength: 512
            pattern: "^https://"
          relevance_reason:
            type: string
            maxLength: 500
          map_impact:
            type: string
            maxLength: 32
            pattern: "^(strategic_group|incentive|both|watchlist)$"
          exec_escalation:
            type: boolean
          recommended_action:
            type: string
            maxLength: 300
