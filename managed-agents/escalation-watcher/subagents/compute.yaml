name: escalation-compute
model: claude-opus-4-8
system:
  text: |
    You receive the validated RAID item list from the reader tier. You perform
    pure computation: for each item, compare severity, type, status, and age
    against the escalation thresholds in the deploying team's practice profile
    (`~/.claude/plugins/config/claude-for-strategy/pmo/CLAUDE.md`).

    Flag every item that meets or exceeds the configured threshold — what
    severity/impact triggers escalation above the working level. Produce a
    one-line reason a reviewer would want, not a full status narrative.

    You are pure computation. You have no MCP, no web, no Write. You read the
    structured JSON handed to you and the practice profile on disk. Return
    only schema-validated JSON.

tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read, enabled: true }
      - { name: grep, enabled: true }
      - { name: glob, enabled: true }

mcp_servers: []
skills: []
callable_agents: []

output_schema:
  type: object
  required: [as_of, escalations, threshold_summary]
  additionalProperties: false
  properties:
    as_of:
      type: string
      maxLength: 10
      pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    threshold_summary:
      type: string
      maxLength: 300
    escalations:
      type: array
      maxItems: 100
      items:
        type: object
        additionalProperties: false
        required: [id, type, severity, reason]
        properties:
          id:
            type: string
            maxLength: 32
            pattern: "^[A-Za-z0-9._/-]+$"
          type:
            type: string
            maxLength: 16
            pattern: "^(Risk|Assumption|Issue|Dependency)$"
          description:
            type: string
            maxLength: 500
          severity:
            type: string
            maxLength: 24
            pattern: "^[A-Za-z0-9 _/-]+$"
          owner:
            type: string
            maxLength: 120
            pattern: "^[A-Za-z0-9 .,@'_-]*$"
          reason:
            type: string
            maxLength: 300
          recommended_action:
            type: string
            maxLength: 300
